services:
  # 1. MinIO - Object Storage
  minio:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 2. CouchDB - Database
  couchdb:
    image: couchdb:latest
    container_name: metadata_db
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: "admin"
      COUCHDB_PASSWORD: "password123"
    volumes:
      - couchdb_data:/opt/couchdb/data

  # 3. Apache OpenWhisk
  openwhisk:
    image: openwhisk/standalone:nightly
    container_name: openwhisk_server
    ports:
      - "3233:3233"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock

# YEH HISSA MISSING THA JISKI WAJAH SE ERROR AAYA
volumes:
  minio_data:
  couchdb_data: